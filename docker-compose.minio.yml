services:
  minio:
    image: minio/minio:latest
    container_name: maono-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console Web
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: maono-dev
      MINIO_ROOT_PASSWORD: maono-dev-secret
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  minio_data:
    driver: local
