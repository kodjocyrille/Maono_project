name: Maono API – CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  # ──────────────────────────────────────────────
  # 1. BUILD
  # ──────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Maono_project.slnx

      - name: Build solution (Release)
        run: dotnet build Maono_project.slnx -c Release --no-restore

  # ──────────────────────────────────────────────
  # 2. TEST
  # ──────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Maono_project.slnx

      - name: Run unit tests
        run: dotnet test Maono.Api.Tests/Maono.Api.Tests.csproj -c Release --no-restore --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/*.trx

  # ──────────────────────────────────────────────
  # 3. DOCKER BUILD (validate Dockerfile)
  # ──────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t maono-api:${{ github.sha }} .

  # ──────────────────────────────────────────────
  # 4. DEPLOY TO RENDER (main only)
  # ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -sf "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            || (echo "⚠️  Deploy hook failed. Check RENDER_DEPLOY_HOOK_URL secret." && exit 1)
